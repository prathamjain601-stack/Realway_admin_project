version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: realway_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: realway_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - realway-net

volumes:
  pgdata:

networks:
  realway-net:
    driver: bridge
