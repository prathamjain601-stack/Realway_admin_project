version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: realway_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: realway_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - realway-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d realway_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  realway-net:
    driver: bridge
